name: Docker

on:
  pull_request:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: Push prod image to ACR
        type: boolean
        default: false

env:
  REGISTRY: lkbul.azurecr.io
  IMAGE_REPOSITORY: ariana-mcp
  BUILD_CONTEXT: .
  DOCKERFILE_PATH: Ariana-Mcp/Dockerfile

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - run: dotnet restore

      - run: dotnet build --no-restore -c Release

  docker:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Set Docker metadata
        id: docker
        shell: bash
        run: |
          registry="${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}"
          case "${{ github.event_name }}" in
            push)
              echo "push=true" >> "$GITHUB_OUTPUT"
              {
                echo "tags<<EOF"
                echo "${registry}:dev-latest"
                echo "${registry}:${{ github.run_number }}-dev"
                echo "EOF"
              } >> "$GITHUB_OUTPUT"
              ;;
            release)
              echo "push=true" >> "$GITHUB_OUTPUT"
              {
                echo "tags<<EOF"
                echo "${registry}:latest-prod"
                echo "${registry}:${{ github.run_number }}-prod"
                echo "EOF"
              } >> "$GITHUB_OUTPUT"
              ;;
            workflow_dispatch)
              if [[ "${{ inputs.publish }}" == "true" ]]; then
                echo "push=true" >> "$GITHUB_OUTPUT"
                {
                  echo "tags<<EOF"
                  echo "${registry}:latest-prod"
                  echo "${registry}:${{ github.run_number }}-prod"
                  echo "EOF"
                } >> "$GITHUB_OUTPUT"
              else
                echo "push=false" >> "$GITHUB_OUTPUT"
                echo "tags=${registry}:local-build" >> "$GITHUB_OUTPUT"
              fi
              ;;
            *)
              echo "push=false" >> "$GITHUB_OUTPUT"
              echo "tags=${registry}:pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Log in to ACR
        if: steps.docker.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.LKBUL_ACR_USERNAME }}
          password: ${{ secrets.LKBUL_ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          push: ${{ steps.docker.outputs.push == 'true' }}
          build-args: |
            BUILD_CONFIGURATION=Release
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.docker.outputs.tags }}
