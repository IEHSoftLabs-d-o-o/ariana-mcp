name: Build, test, and push Docker image (ACR)

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main, release]

permissions:
  contents: read
  packages: read

concurrency:
  group: ariana-mcp-${{ github.ref_name }}
  cancel-in-progress: true

env:
  IMAGE_REPOSITORY: ariana-mcp
  REGISTRY: lkbul.azurecr.io
  DOCKERFILE_PATH: ./Ariana-Mcp/Dockerfile
  BUILD_CONTEXT: .

jobs:
  build:
    name: Build .NET solution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Display .NET info
        run: dotnet --info

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore -c Release

  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: build
    env:
      BUILD_TAG: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image tag from branch
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "BUILD_TAG=dev" >> "$GITHUB_ENV"
          elif [ "${GITHUB_REF_NAME}" = "release" ]; then
            echo "BUILD_TAG=prod" >> "$GITHUB_ENV"
          else
            echo "Branch is neither main nor release. Using default tag: test."
          fi

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.LKBUL_ACR_USERNAME }}
          password: ${{ secrets.LKBUL_ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          build-args: |
            BUILD_CONFIGURATION=Release
          push: ${{ github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'release') }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:latest-${{ env.BUILD_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${{ github.run_number }}-${{ env.BUILD_TAG }}
